name: analyst-daily

on:
  schedule:
    # 6pm UTC = 9pm Kampala (UTC+3)
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  analyse:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: checkout devpulse
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install -r requirements.txt

      - name: run analyst
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python scripts/analyst/analyse.py

      - name: commit enriched data and graphs
        run: |
          git config user.name "devpulse-bot"
          git config user.email "devpulse-bot@users.noreply.github.com"
          git add data/ docs/assets/
          git diff --staged --quiet || git commit -m "analyst: daily enrichment [skip ci]"
          git push
