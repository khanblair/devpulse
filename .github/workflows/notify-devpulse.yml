name: notify-devpulse

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: send push event to devpulse
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          GIT_REF: ${{ github.ref }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          DEVPULSE_TOKEN: ${{ secrets.DEVPULSE_TOKEN }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo_name "$REPO_NAME" \
            --arg ref "$GIT_REF" \
            --argjson commits "$COMMITS_JSON" \
            '{
              event_type: "push_event",
              client_payload: {
                repository: { name: $repo_name },
                ref: $ref,
                commits: $commits
              }
            }')
          curl -s -X POST \
            -H "Authorization: token $DEVPULSE_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/khanblair/devpulse/dispatches \
            -d "$PAYLOAD"
