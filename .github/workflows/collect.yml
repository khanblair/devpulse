name: collector-collect

on:
  repository_dispatch:
    types: [push_event]

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: checkout devpulse
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install httpx

      - name: run collector
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: python scripts/collector/collect.py

      - name: commit updated log
        run: |
          git config user.name "devpulse-bot"
          git config user.email "devpulse-bot@users.noreply.github.com"
          git add data/log.json
          git diff --staged --quiet || git commit -m "log: commit recorded [skip ci]"
          git push
