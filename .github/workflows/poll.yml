name: collector-poll

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: checkout devpulse
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install httpx

      - name: poll all repos
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: python scripts/collector/poll.py

      - name: commit updated log
        run: |
          git config user.name "devpulse-bot"
          git config user.email "devpulse-bot@users.noreply.github.com"
          git add data/log.json
          git diff --staged --quiet || git commit -m "log: commits polled [skip ci]"
          git push